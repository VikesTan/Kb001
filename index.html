<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="icon" href="/favicon.ico?v=2" type="image/x-icon">
<link rel="shortcut icon" href="/favicon.ico?v=2" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KreatBloom 创意绽放</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            color: #333;
            background-color: #fff;
            padding: 40px 20px;
        }
        .logo-area {
            margin-bottom: 40px;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            margin: 0 auto 12px;
        }
        .logo-icon img{
            width:100%;
            height:100%;
            object-fit:contain;
        }
        .logo-title-en {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .logo-title-zh {
            font-size: 16px;
            color: #333;
        }
        .tagline {
            font-size: 36px;
            color: #888;
            margin-bottom: 40px;
        }
        /* 调高容器高度，适配完整图片 */
        .image-block {
            width: 96%;
            max-width: 800px;
            height: auto;
            margin: 0 auto 40px;
            cursor: pointer;
        }
        .image-block img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }
        .contact-area {
            margin: 60px 0 20px;
            color: #888;
        }
        .contact-label {
            font-size: 20px;
            margin-bottom: 2px;
        }
        .contact-email {
            font-size: 20px;
            color: #888;
            text-decoration: none;
        }
        .footer-logo {
            width: 32px;
            height: 32px;
            margin: 0 auto 20px;
        }
        .footer-logo img{
            width:100%;
            height:100%;
            object-fit:contain;
        }
        .footer {
            font-size: 12px;
            color: #aaa;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="logo-area">
    <div class="logo-icon">
        <img src="./images/logo1.png" alt="logo">
    </div>
    <div class="logo-title-en">KreatBloom</div>
    <div class="logo-title-zh">创意绽放</div>
</div>

<div class="tagline">为生活绽放创意</div>

<div class="image-block">
    <a href="https://apps.apple.com/cn/app/id1627691759" target="_blank" style="display:block;">
        <img src="./images/img1.png" alt="展示图">
    </a>
</div>

<div class="image-block">
    <a href="https://apps.apple.com/cn/app/id1671273737" target="_blank" style="display:block;">
        <img src="./images/img2.png" alt="展示图">
    </a>
</div>

<div class="contact-area">
    <div class="contact-label">联系</div>
    <a href="mailto:support@kreatbloom.com" class="contact-email">support@kreatbloom.com</a>
</div>

<div class="footer-logo">
    <img src="./images/logo2.png" alt="logo">
</div>

<div class="footer">
    © 2026 Shenzhen KreatBloom Technology Co., Ltd. All rights reserved. 深圳创意绽放科技有限公司 版权所有<br>
    地址：Room 307, Building 615, Bagualing Industrial Zone, Pengsheng Community, Yuanling Subdistrict, Futian District, Shenzhen, Guangdong Province
</div>

</body>
</html>
