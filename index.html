<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KreatBloom 创意绽放</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            color: #333;
            background-color: #fff;
            padding: 40px 20px;
        }
        /* 顶部 Logo 区 */
        .logo-area {
            margin-bottom: 40px;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background-color: #ddd;
            margin: 0 auto 12px;
        }
        .logo-title-en {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .logo-title-zh {
            font-size: 16px;
            color: #333;
        }
        /* 标语 */
        .tagline {
            font-size: 36px;
            color: #888;
            margin-bottom: 40px;
        }
        /* 图片区 */
        .image-block {
            width: 60%;
            max-width: 700px;
            height: 280px;
            background-color: #ddd;
            margin: 0 auto 40px;
        }
        /* 联系信息 */
        .contact-area {
            margin: 60px 0 20px;
            color: #888;
        }
        .contact-label {
            font-size: 14px;
            margin-bottom: 8px;
        }
        .contact-email {
            font-size: 16px;
        }
        /* 底部 Logo */
        .footer-logo {
            width: 16px;
            height: 16px;
            background-color: #ddd;
            margin: 0 auto 10px;
        }
        /* 底部版权 */
        .footer {
            font-size: 10px;
            color: #aaa;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <!-- 顶部 Logo -->
    <div class="logo-area">
        <div class="logo-icon">
            <!-- 这里可以替换成你的 Logo 图片 -->
            <!-- <img src="./images/logo-top.png" alt="Logo" style="width:100%;height:100%;object-fit:contain;"> -->
        </div>
        <div class="logo-title-en">KreatBloom</div>
        <div class="logo-title-zh">创意绽放</div>
    </div>

    <!-- 标语 -->
    <div class="tagline">为生活绽放创意</div>

    <!-- 两张图片（灰色块占位） -->
    <div class="image-block">
        <!-- <img src="./images/pic1.jpg" alt="配图" style="width:100%;height:100%;object-fit:cover;"> -->
    </div>
    <div class="image-block">
        <!-- <img src="./images/pic2.jpg" alt="配图" style="width:100%;height:100%;object-fit:cover;"> -->
    </div>

    <!-- 联系信息 -->
    <div class="contact-area">
        <div class="contact-label">联系</div>
        <div class="contact-email">support@kreatbloom.com</div>
    </div>

    <!-- 底部 Logo -->
    <div class="footer-logo">
        <!-- <img src="./images/logo-footer.png" alt="Logo" style="width:100%;height:100%;object-fit:contain;"> -->
    </div>

    <!-- 底部版权 -->
    <div class="footer">
        ©2026 Shenzhen KreatBloom Technology Co., Ltd. 深圳创意绽放科技有限公司 版权所有<br>
        地址：Room 307, Building 615, Bagualing Industrial Zone, Pengsheng Community, Yuanling Subdistrict, Futian District, Shenzhen, Guangdong Province
    </div>
</body>
</html>
